spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bipdb
    username: ${DB_USER:bip}
    password: ${DB_PASSWORD:bip}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_versioned_data: true
        order_updates: true
        order_inserts: true
  sql:
    init:
      mode: always

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
